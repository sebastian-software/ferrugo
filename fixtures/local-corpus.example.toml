# Copy this file to fixtures/local-corpus/metadata.toml for local-only PDFs.
#
# Keep this metadata aggregate-only. Do not record private filenames, hashes,
# extracted text, screenshots, rendered outputs, or customer-specific labels.

schema_version = 1
review_date = "2026-06-25"
reviewer = "local"
notes = "Aggregate local corpus intake metadata for private or reference-only PDFs."

[[sample]]
id = "invoice-export-private"
category = "invoice"
privacy = "private"
permission = "local-review-only"
redaction_state = "reduced-to-fixture"
source_note = "internal invoice export"
count = 3
page_count_range = "2-10"
features = ["text", "tables", "embedded-fonts"]
synthetic_replacement = "fixtures/generated/office-table.pdf"
status = "reviewed"

[[sample]]
id = "scan-packet-private"
category = "scanned-packet"
privacy = "private"
permission = "local-review-only"
redaction_state = "not-shareable"
source_note = "internal scan packet"
count = 2
page_count_range = "11-50"
features = ["scanned", "devicegray", "large-image"]
synthetic_replacement = "fixtures/generated/scanned-page.pdf"
status = "candidate"
