[workspace]
members = [
    "crates/pdfrust-cli",
    "crates/pdfrust-pdfium",
    "crates/pdfrust-thumbnail",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/pdfrust/pdfrust"
rust-version = "1.81"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "deny"

[workspace.lints.clippy]
all = "deny"
perf = "deny"
